<nav class="navbar">
  <div class="nav-shell">
    <a routerLink="/home" class="logo">Country Atlas</a>

    <ul class="nav-links">
      <li><a routerLink="/countries" routerLinkActive="active">View All Countries</a></li>
      <li><a routerLink="/search" routerLinkActive="active">Search</a></li>
      <li><a routerLink="/about" routerLinkActive="active">About</a></li>

      <ng-container *ngIf="!isLoggedIn; else loggedInNav">
        <li class="auth-item"><a routerLink="/login" routerLinkActive="active">Login</a></li>
        <li class="auth-item"><a routerLink="/register" routerLinkActive="active">Register</a></li>
      </ng-container>

      <ng-template #loggedInNav>
        <li><a routerLink="/favorites" routerLinkActive="active">Favorites</a></li>
        <li class="user-badge-wrap">
          <span class="user-badge">Hi, {{ currentUsername }}</span>
        </li>
        <li class="auth-item">
          <button class="logout-btn" (click)="logout()">Logout</button>
        </li>
      </ng-template>
    </ul>
  </div>
</nav>

<main class="content">
  <router-outlet></router-outlet>
</main>
