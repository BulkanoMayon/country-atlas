<div class="auth-page">
  <div class="auth-card">
    <h1>Login</h1>
    <p class="subtitle">Welcome back to Country Atlas.</p>

    <form class="auth-form" (ngSubmit)="onLogin()">
      <label>
        Email
        <input type="email" [(ngModel)]="email" name="email" placeholder="you@example.com" />
      </label>

      <label>
        Password
        <input type="password" [(ngModel)]="password" name="password" placeholder="••••••••" />
      </label>

      <button type="submit">Login</button>
    </form>

    <p class="message error" *ngIf="errorMessage">{{ errorMessage }}</p>
    <p class="message success" *ngIf="successMessage">{{ successMessage }}</p>

    <p class="hint">
      Don’t have an account? <a routerLink="/register">Register</a>
    </p>
  </div>
</div>
